version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Run with:  docker compose up --build
# Stop with: docker compose down
# Reset DB:  docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matching_engine_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite:////app/data/matching.db"
      # For PostgreSQL, swap above and uncomment:
      # DATABASE_URL: "postgresql://matchuser:matchpass@db:5432/matchingdb"
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend UI ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: matching_engine_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL (optional) ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: matching_engine_db
    environment:
      POSTGRES_USER:     matchuser
      POSTGRES_PASSWORD: matchpass
      POSTGRES_DB:       matchingdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchuser -d matchingdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  postgres_data: