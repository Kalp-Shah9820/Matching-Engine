services:
  - type: web
    name: matching-engine-api
    env: python
    buildCommand: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: managed-db-name # If using Render Managed DB, otherwise provide Supabase URL manually
          property: connectionString
